<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hepi Tabungan</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="/style.css?v=3" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar" id="topbar">
    <nav class="nav">
      <div class="nav-brand">
        <div class="logo-h">H</div>
        <span class="nav-title">Hepi Tabungan</span>
      </div>
    </nav>
  </header>

  <!-- LOGIN -->
  <section id="login-section" class="card login-card">
    <div class="login-brand">
      <div class="logo-h lg">H</div>
      <div>
        <div class="login-title">Hepi Tabungan</div>
        <div class="login-sub">Admin Dashboard</div>
      </div>
    </div>
    <div class="row">
      <input id="user" placeholder="Username" autocomplete="username" />
      <input id="pass" placeholder="Password" type="password" autocomplete="current-password" />
      <button id="btnLogin" class="primary">Login</button>
    </div>
    <p id="loginMsg" class="muted"></p>
  </section>

  <!-- DASHBOARD -->
  <section id="dashboard" class="card" style="display:none">
    <div class="row between">
      <div class="dash-brand">
        <div class="logo-h sm">H</div>
        <h1>Dashboard Tabungan</h1>
      </div>
      <button id="btnLogout" class="secondary">Logout</button>
    </div>
    <div id="admin-root"></div>
  </section>

  <!-- PUBLIC VIEW -->
  <section id="public-view" style="display:none">
    <!-- topbar publik dengan logo -->
    <div class="pub-topbar">
      <div class="logo-h sm">H</div>
      <div>
        <div class="pub-topbar-title">Hepi Tabungan</div>
        <div class="pub-topbar-sub">Kelola tabunganmu dengan mudah</div>
      </div>
    </div>
    <div id="public-root"></div>
  </section>

  <script src="/app.js?v=3"></script>
</body>
</html>
